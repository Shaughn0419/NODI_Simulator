[pytest]
addopts = -ra
pythonpath = .
testpaths =
    tests
norecursedirs =
    .claude
    .codex_pdf_venv
    .mypy_cache
    .omx
    .pdf_output
    .pytest_cache
    .pytest_vendor
    .ruff_cache
    .venv
    .venv-tests
    __pycache__
    archive
    review_bundles
    reports
    results
    tmp
markers =
    app_interactions: real Streamlit AppTest interactions that should run serially
    requires_results: tests that need precomputed gitignored result artifacts
    review_package_required: P0a/P0b review-package reproducibility and schema checks
    requires_measured_data: tests that require measured detector/blank/paper artifacts
    requires_fullwave: tests that require full-wave/vector solver execution
    requires_fullgrid_recompute: tests that require full v1/v2 grid recomputation
