[pytest]
addopts = -ra
pythonpath = .
testpaths =
    tests
norecursedirs =
    .claude
    .codex_pdf_venv
    .mypy_cache
    .omx
    .pdf_output
    .pytest_cache
    .pytest_vendor
    .ruff_cache
    .venv
    .venv-tests
    __pycache__
    archive
    review_bundles
    reports
    results
    tmp
markers =
    app_interactions: real Streamlit AppTest interactions that should run serially
    requires_results: tests that need precomputed gitignored result artifacts
